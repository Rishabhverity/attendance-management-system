databases:
  - name: leave-management-db
    plan: free

services:
  - type: web
    name: leave-management
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn leave_management.wsgi:application"
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: leave-management-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.3"
